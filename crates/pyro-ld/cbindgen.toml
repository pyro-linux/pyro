language = "C"
cpp_compat = true
header = "/* Generated by cbindgen for pyro-ld */"
include_guard = "PYRO_LD_H"
autogen_warning = "/* Warning: This file is auto-generated. Do not modify. */"
documentation = true
documentation_style = "c99"

[export]
include = ["DynamicLinkerInfo"]

[export.rename]

[parse]
parse_deps = false
include = ["pyro-ld"]

[fn]
rename_args = "GeckoCase"

[struct]
rename_fields = "GeckoCase"

[enum]
rename_variants = "GeckoCase"
